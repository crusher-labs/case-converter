<!DOCTYPE html>
<html lang="en"
      data-default-theme="minimal"
      data-theme-lock="minimal"
      data-default-mode="light"
      data-default-brand="#0ea5e9">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/themes/minimal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.css">
    <script defer src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }

        .tool-stack { display: grid; gap: var(--crusher-spacing-6); max-width: 48rem; margin-inline: auto; }
        .tool-section { padding: var(--crusher-spacing-6); display: grid; gap: var(--crusher-spacing-6); }

        .tool-textarea-wrap { position: relative; }
        .tool-textarea-wrap textarea.crusher-tool-control { min-block-size: 16rem; padding: var(--crusher-spacing-4); resize: vertical; }
        .tool-stats {
            position: absolute; inset-block-end: var(--crusher-spacing-3); inset-inline-end: var(--crusher-spacing-4);
            font-size: var(--crusher-font-size-xs); font-family: 'JetBrains Mono', monospace;
            color: var(--crusher-text-secondary);
            pointer-events: none;
        }

        .case-section-title { margin: 0 0 var(--crusher-spacing-4); font-size: var(--crusher-font-size-lg); color: var(--crusher-text-primary); }
        .case-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--crusher-spacing-3); }
        @media (min-width: 640px) { .case-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
        .case-btn {
            padding: var(--crusher-spacing-3) var(--crusher-spacing-4);
            border-radius: var(--crusher-radius-lg);
            border: 1px solid var(--crusher-border-primary);
            background: var(--crusher-background-muted);
            color: var(--crusher-text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: background-color var(--crusher-motion-duration-fast) var(--crusher-motion-easing-standard),
                        border-color var(--crusher-motion-duration-fast) var(--crusher-motion-easing-standard);
        }
        .case-btn:hover { background: color-mix(in srgb, var(--crusher-color-brand-primary) 18%, var(--crusher-background-surface)); border-color: var(--crusher-color-brand-primary); }

        .util-row { display: grid; gap: var(--crusher-spacing-3); padding-block-start: var(--crusher-spacing-4); }
        @media (min-width: 640px) { .util-row { grid-template-columns: 1fr 1fr; } }
        .util-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: var(--crusher-spacing-2);
            padding: var(--crusher-spacing-3) var(--crusher-spacing-4);
            border-radius: var(--crusher-radius-lg);
            border: 0;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--crusher-shadow-md);
            transition: transform var(--crusher-motion-duration-fast) var(--crusher-motion-easing-standard),
                        box-shadow var(--crusher-motion-duration-fast) var(--crusher-motion-easing-standard);
        }
        .util-btn:hover { transform: translateY(-1px); box-shadow: var(--crusher-shadow-lg); }
        .util-copy { background: #16a34a; }
        .util-copy:hover { background: #15803d; }
        .util-clear { background: #dc2626; }
        .util-clear:hover { background: #b91c1c; }

        .copy-message {
            text-align: center; margin: 0;
            min-block-size: 1.25rem;
            color: #16a34a;
            font-size: var(--crusher-font-size-sm);
            opacity: 0;
            transition: opacity var(--crusher-motion-duration-fast) var(--crusher-motion-easing-standard);
        }
        .copy-message[data-visible="true"] { opacity: 1; }
    </style>
</head>
<body class="crusher-tool-page">

    <main class="crusher-tool-shell">
        <header class="crusher-tool-header">
            <h1 class="crusher-tool-title">Case Converter</h1>
            <p class="crusher-tool-lede">Instantly convert text between different letter cases.</p>
        </header>

        <div class="tool-stack">
            <section class="crusher-tool-surface tool-section">
                <div class="tool-textarea-wrap">
                    <textarea id="text-input" class="crusher-tool-control" placeholder="Type or paste your text here..."></textarea>
                    <div id="stats" class="tool-stats">
                        <span id="char-count">0</span> characters | <span id="word-count">0</span> words
                    </div>
                </div>

                <div>
                    <h2 class="case-section-title">Convert Case</h2>
                    <div class="case-grid">
                        <button id="btn-upper" type="button" class="case-btn">UPPERCASE</button>
                        <button id="btn-lower" type="button" class="case-btn">lowercase</button>
                        <button id="btn-title" type="button" class="case-btn">Title Case</button>
                        <button id="btn-sentence" type="button" class="case-btn">Sentence case</button>
                    </div>
                </div>

                <div class="util-row">
                    <button id="btn-copy" type="button" class="util-btn util-copy">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        Copy to Clipboard
                    </button>
                    <button id="btn-clear" type="button" class="util-btn util-clear">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        Clear Text
                    </button>
                </div>
                <p id="copy-message" class="copy-message">Text copied to clipboard!</p>
            </section>
        </div>
    </main>

    <a href="https://tools.muhammadhassaanjaved.com/" id="hub-bubble" class="crusher-tool-fab" title="View All Tools" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
    </a>

    <crusher-style-switcher
      default-theme="minimal"
      default-brand="#0ea5e9"
      hide-themes
      hide-theme-color></crusher-style-switcher>
    <script type="module" src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.standalone.esm.js"></script>

    <script>
        const textInput = document.getElementById('text-input');
        const charCountEl = document.getElementById('char-count');
        const wordCountEl = document.getElementById('word-count');
        const copyMessageEl = document.getElementById('copy-message');

        const btnUpper = document.getElementById('btn-upper');
        const btnLower = document.getElementById('btn-lower');
        const btnTitle = document.getElementById('btn-title');
        const btnSentence = document.getElementById('btn-sentence');

        const btnCopy = document.getElementById('btn-copy');
        const btnClear = document.getElementById('btn-clear');

        textInput.addEventListener('input', () => {
            const text = textInput.value;
            charCountEl.textContent = text.length;
            const words = text.trim().split(/\s+/).filter(word => word.length > 0);
            wordCountEl.textContent = text.trim() === '' ? 0 : words.length;
        });

        btnUpper.addEventListener('click', () => {
            textInput.value = textInput.value.toUpperCase();
        });

        btnLower.addEventListener('click', () => {
            textInput.value = textInput.value.toLowerCase();
        });

        btnTitle.addEventListener('click', () => {
            textInput.value = textInput.value.toLowerCase().split(' ').map(word => {
                return word.charAt(0).toUpperCase() + word.slice(1);
            }).join(' ');
        });

        btnSentence.addEventListener('click', () => {
            textInput.value = textInput.value.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g, c => c.toUpperCase());
        });

        btnCopy.addEventListener('click', async () => {
            if (!textInput.value) return;
            try {
                await navigator.clipboard.writeText(textInput.value);
            } catch {
                const dummy = document.createElement('textarea');
                document.body.appendChild(dummy);
                dummy.value = textInput.value;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
            }
            copyMessageEl.dataset.visible = 'true';
            setTimeout(() => { copyMessageEl.dataset.visible = 'false'; }, 2000);
        });

        btnClear.addEventListener('click', () => {
            textInput.value = '';
            textInput.dispatchEvent(new Event('input'));
        });

        textInput.dispatchEvent(new Event('input'));
    </script>
</body>
</html>
